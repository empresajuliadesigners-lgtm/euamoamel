<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Universo é Você 🌌</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@400;700&family=Dancing+Script:wght@400;700&family=Cormorant+Garamond:ital,wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #e6396b;
  --deep: #4a0028;
  --gold: #f4c095;
  --soft: #ffe5f0;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(180deg, #1a0022 0%, #2e001f 50%, #1a0022 100%);
  color: #ffe5f0;
  font-family: 'Cormorant Garamond', serif;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ... (mantive o CSS anterior intacto para brevidade) ... */
#musicPlayer {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(26,0,34,0.95);
  border: 2px solid var(--rose);
  border-radius: 50px;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  z-index: 2000;
  box-shadow: 0 10px 40px rgba(230,57,107,0.4);
  max-width: 92%;
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- Intro Screen -->
<div id="introScreen" style="position:fixed;inset:0;background:radial-gradient(#4a0028,#1a0022);z-index:5000;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;">
  <div style="font-size:6rem;margin-bottom:1rem;animation:heartbeat 2s infinite;">🌹</div>
  <h1 style="font-size:clamp(2.2rem,8vw,4rem);color:var(--gold);">Para o Amor da Minha Vida</h1>
  <button onclick="startJourney()" style="margin-top:3rem;background:linear-gradient(90deg,#e6396b,#f4c095);color:#1a0022;font-family:'Dancing Script',cursive;font-size:1.8rem;padding:1rem 3rem;border:none;border-radius:999px;cursor:pointer;">Começar Nossa História</button>
</div>

<!-- Tab Bar -->
<nav class="tab-bar" id="tabBar" style="display:none">
  <button class="tab-btn active" data-tab="home">🏠 Início</button>
  <button class="tab-btn locked" data-tab="journey">🌟 Nossa Jornada</button>
  <button class="tab-btn locked" data-tab="memories">📸 Memórias</button>
  <button class="tab-btn locked" data-tab="loveGames">🎲 Jogos do Coração</button>
  <button class="tab-btn locked" data-tab="finalLetter">💌 Carta Eterna</button>
</nav>

<!-- Tab Contents (mantidos iguais) -->
<div id="home" class="tab-content active"> ... </div>
<div id="journey" class="tab-content"> ... </div>
<div id="memories" class="tab-content"> ... </div>
<div id="loveGames" class="tab-content"> ... </div>
<div id="finalLetter" class="tab-content"> ... </div>

<!-- Music Player -->
<div id="musicPlayer" style="display:none">
  <button onclick="prevTrack()">⏮</button>
  <button id="playPauseBtn" onclick="togglePlay()">▶</button>
  <button onclick="nextTrack()">⏭</button>
  <div class="progress-container" onclick="seek(event)">
    <div id="progressBar" class="progress"></div>
  </div>
  <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
  <span id="currentTrack" style="min-width:160px;">Carregando...</span>
</div>

<div id="ytPlayer" style="display:none;"></div>

<script>
// Playlist
const playlist = [
  {id: "2Vv-BfVoq4g", title: "Perfect", artist: "Ed Sheeran"},
  {id: "JGwWNGJdvx8", title: "Shape of You", artist: "Ed Sheeran"},
  {id: "lp-EO5I60KA", title: "Thinking Out Loud", artist: "Ed Sheeran"},
  {id: "0zGcQJ2v0sQ", title: "Deus é Top", artist: "Luan Santana"},
  {id: "kXv4z6r8QfM", title: "Morena", artist: "Luan Santana"},
  {id: "5qap5aO7eqU", title: "Incondicional", artist: "Gustavo Mioto"}
];

let currentTrack = 0;
let player = null;
let isPlaying = false;
let apiReady = false;

// YouTube API Ready
function onYouTubeIframeAPIReady() {
  apiReady = true;
  player = new YT.Player('ytPlayer', {
    height: '0',
    width: '0',
    videoId: playlist[0].id,
    playerVars: {
      autoplay: 0,
      controls: 0,
      modestbranding: 1,
      rel: 0
    },
    events: {
      onReady: onPlayerReady,
      onStateChange: onPlayerStateChange
    }
  });
}

function onPlayerReady(event) {
  event.target.setVolume(80);
  document.getElementById('currentTrack').textContent = `${playlist[0].title} - ${playlist[0].artist}`;
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.ENDED) {
    nextTrack();
  }
}

// Music Controls
function togglePlay() {
  if (!player || !apiReady) return;
  if (isPlaying) {
    player.pauseVideo();
    document.getElementById('playPauseBtn').textContent = '▶';
  } else {
    player.playVideo();
    document.getElementById('playPauseBtn').textContent = '❚❚';
  }
  isPlaying = !isPlaying;
}

function nextTrack() {
  currentTrack = (currentTrack + 1) % playlist.length;
  loadTrack();
}

function prevTrack() {
  currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
  loadTrack();
}

function loadTrack() {
  if (!player || !apiReady) return;
  player.loadVideoById(playlist[currentTrack].id);
  document.getElementById('currentTrack').textContent = `${playlist[currentTrack].title} - ${playlist[currentTrack].artist}`;
}

function setVolume(val) {
  if (player && apiReady) player.setVolume(val * 100);
}

function seek(e) {
  if (!player || !apiReady) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const percent = (e.clientX - rect.left) / rect.width;
  player.seekTo(player.getDuration() * percent);
}

// Start Journey
function startJourney() {
  document.getElementById('introScreen').style.display = 'none';
  document.getElementById('tabBar').style.display = 'flex';
  document.getElementById('musicPlayer').style.display = 'flex';
  
  // Load first track safely
  if (apiReady && player) {
    loadTrack();
    player.playVideo();
    isPlaying = true;
    document.getElementById('playPauseBtn').textContent = '❚❚';
  }
}

// Background Animation (mantido)
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
// ... (código do canvas igual ao anterior)

// Inicializa o YouTube API
const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

// Outros jogos e funções permanecem iguais...
</script>
</body>
</html>
