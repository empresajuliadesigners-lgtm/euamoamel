<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Universo é Você 🌌</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #e6396b;
  --gold: #f4c095;
  --purple: #6b2d5e;
  --soft: #ffe5f0;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #2a0033 0%, #1a0022 100%);
  color: #ffe5f0;
  font-family: 'Cormorant Garamond', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

#bgCanvas { position: fixed; inset: 0; z-index: -1; }

.tab-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  background: rgba(26,0,34,0.9);
  backdrop-filter: blur(15px);
  border-bottom: 1px solid rgba(230,57,107,0.4);
  display: flex;
  padding: 15px 0;
  text-align: center;
}
.tab-btn {
  flex: 1;
  padding: 14px 8px;
  background: none;
  border: none;
  color: #ffe5f0;
  font-family: 'Dancing Script', cursive;
  font-size: clamp(1.1rem, 3.8vw, 1.4rem);
  cursor: pointer;
  transition: 0.4s;
}
.tab-btn.active { color: var(--gold); text-shadow: 0 0 15px var(--rose); }
.tab-btn.locked { opacity: 0.45; cursor: not-allowed; }

.tab-content { display: none; padding: 90px 20px 100px; min-height: 100vh; }
.tab-content.active { display: block; }

.game-section {
  max-width: 700px;
  margin: 2rem auto;
  background: rgba(255,229,240,0.08);
  border-radius: 24px;
  padding: 2rem;
  border: 1px solid rgba(230,57,107,0.3);
}

/* Music Player */
#musicPlayer {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(26,0,34,0.95);
  border: 2px solid var(--rose);
  border-radius: 50px;
  padding: 12px 25px;
  display: flex;
  align-items: center;
  gap: 15px;
  z-index: 2000;
  box-shadow: 0 15px 50px rgba(230,57,107,0.6);
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- INTRO -->
<div id="introScreen" style="position:fixed;inset:0;z-index:5000;background:linear-gradient(#4a0028,#1a0022);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;">
  <h1 style="font-size:clamp(3rem,10vw,6rem);font-family:'Playfair Display',serif;color:var(--gold);">Meu Universo é Você</h1>
  <button onclick="startJourney()" style="margin-top:40px;padding:18px 50px;font-size:1.8rem;background:linear-gradient(#e6396b,#f4c095);color:#1a0022;border:none;border-radius:50px;cursor:pointer;">Abrir com Amor</button>
</div>

<!-- TAB BAR -->
<nav class="tab-bar" id="tabBar" style="display:none">
  <button class="tab-btn active" data-tab="home">🏠 Início</button>
  <button class="tab-btn locked" data-tab="journey">🌟 Nossa Jornada</button>
  <button class="tab-btn locked" data-tab="memories">📸 Memórias</button>
  <button class="tab-btn locked" data-tab="loveGames">🎲 Jogos do Coração</button>
  <button class="tab-btn locked" data-tab="finalLetter">💌 Carta Eterna</button>
</nav>

<!-- MUSIC PLAYER -->
<div id="musicPlayer" style="display:none">
  <button onclick="prevTrack()">⏮</button>
  <button id="playPauseBtn" onclick="togglePlay()">▶</button>
  <button onclick="nextTrack()">⏭</button>
  <div class="progress-container" style="width:220px;height:6px;background:#3a0028;border-radius:999px;cursor:pointer;" onclick="seek(event)">
    <div id="progressBar" style="height:100%;background:linear-gradient(to right,#e6396b,#f4c095);border-radius:999px;width:0%;"></div>
  </div>
  <input type="range" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)" style="width:100px;accent-color:#f4c095;">
  <span id="currentTrack" style="min-width:170px;font-size:0.95rem;">Perfect - Ed Sheeran</span>
</div>

<div id="ytPlayer" style="display:none;"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// === PLAYLIST ===
const playlist = [
  {id: "2Vv-BfVoq4g", title: "Perfect", artist: "Ed Sheeran"},
  {id: "JGwWNGJdvx8", title: "Shape of You", artist: "Ed Sheeran"},
  {id: "lp-EO5I60KA", title: "Thinking Out Loud", artist: "Ed Sheeran"},
  {id: "0zGcQJ2v0sQ", title: "Deus é Top", artist: "Luan Santana"},
  {id: "kXv4z6r8QfM", title: "Morena", artist: "Luan Santana"}
];

let currentTrack = 0;
let player = null;
let isPlaying = false;
let apiReady = false;

function onYouTubeIframeAPIReady() {
  apiReady = true;
  player = new YT.Player('ytPlayer', {
    height: '0', width: '0',
    videoId: playlist[0].id,
    events: {
      onReady: () => document.getElementById('currentTrack').textContent = "Perfect - Ed Sheeran",
      onStateChange: (e) => { if(e.data === YT.PlayerState.ENDED) nextTrack(); }
    }
  });
}

// Music Controls
function togglePlay() {
  if (!player || !apiReady) return alert("Aguarde um momento...");
  if (isPlaying) player.pauseVideo();
  else player.playVideo();
  document.getElementById('playPauseBtn').textContent = isPlaying ? '▶' : '❚❚';
  isPlaying = !isPlaying;
}

function nextTrack() { currentTrack = (currentTrack + 1) % playlist.length; loadTrack(); }
function prevTrack() { currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; loadTrack(); }

function loadTrack() {
  if (player && apiReady) {
    player.loadVideoById(playlist[currentTrack].id);
    document.getElementById('currentTrack').textContent = `${playlist[currentTrack].title} - ${playlist[currentTrack].artist}`;
  }
}

function setVolume(val) { if(player && apiReady) player.setVolume(val*100); }
function seek(e) {
  if(!player || !apiReady) return;
  const percent = (e.clientX - e.currentTarget.getBoundingClientRect().left) / e.currentTarget.offsetWidth;
  player.seekTo(player.getDuration() * percent);
}

// Background Hearts
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
window.addEventListener('resize', () => { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; });

const hearts = [];
for(let i=0; i<50; i++){
  hearts.push({x:Math.random()*W, y:Math.random()*H, size:12+Math.random()*22, speed:0.6+Math.random()*1.2, opacity:0.4+Math.random()*0.5});
}

function animateBG(){
  ctx.clearRect(0,0,W,H);
  hearts.forEach(h => {
    h.y += h.speed;
    if(h.y > H) h.y = -30;
    ctx.globalAlpha = h.opacity;
    ctx.font = `${h.size}px serif`;
    ctx.fillText('❤', h.x, h.y);
  });
  requestAnimationFrame(animateBG);
}
animateBG();

// Tab Navigation
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if(btn.classList.contains('locked')) return;
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById(btn.dataset.tab).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// Start
function startJourney() {
  document.getElementById('introScreen').style.display = 'none';
  document.getElementById('tabBar').style.display = 'flex';
  document.getElementById('musicPlayer').style.display = 'flex';
  
  if(apiReady && player){
    player.playVideo();
    isPlaying = true;
    document.getElementById('playPauseBtn').textContent = '❚❚';
  }
  
  // Unlock first tab content
  document.getElementById('home').classList.add('active');
}

// Add missing tab contents (you can expand later)
document.body.innerHTML += `
<div id="home" class="tab-content active" style="text-align:center;">
  <h1 style="font-size:3.5rem;color:var(--gold);margin:2rem 0;">Eu te amo 💕</h1>
  <p style="font-size:1.4rem;max-width:600px;margin:0 auto;">Cada segundo ao seu lado é o melhor presente que a vida me deu.</p>
</div>

<div id="journey" class="tab-content">Conteúdo da Jornada...</div>
<div id="memories" class="tab-content">Galeria de Memórias...</div>
<div id="loveGames" class="tab-content">Jogos do Coração...</div>
<div id="finalLetter" class="tab-content">Carta Eterna...</div>
`;
</script>
</body>
</html>
